stages:
  - test

backend-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    - pytest -q
  rules:
    - changes:
        - backend/**/*

frontend-build:
  stage: test
  image: node:20-slim
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  rules:
    - changes:
        - frontend/**/*
